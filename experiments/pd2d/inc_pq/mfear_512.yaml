model:
  encoder_net:
    p: &p 512
    mlp:
      hidden_layers:
        - 80
        - 80
        - 80
    feat_expansion:
      features: 640

  reconstructor_net:
    p: &q 512
    mlp:
      hidden_layers:
        - 80
        - 80
        - 80
    feat_expansion:
      features: 640

  approximator_net:
    d_in: *p
    d_out: *q
