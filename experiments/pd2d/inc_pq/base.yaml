model:
  name: MFEAR
  integrator:
    name: TrapezoidIntegrator

  encoder_net:
    name: mfear.StackedMLPBasis
    d_in: 2
    d_out: 2
    p: &p 128
    num_units: 8
    mlp:
      hidden_layers:
        - 20
        - 20
        - 20
      dense_initial: false
      activation:
        name: ReLU
    feat_expansion:
      name: deeponet.FourierFeatureExpansion
      origin: [ 0, 0 ]  # These depend on the dataset being used
      scale: [ 5, 5 ]
      mode: random
      features: 160
      learnable: true

  reconstructor_net:
    name: mfear.StackedMLPBasis
    d_in: 2
    d_out: 2
    p: &q 128
    num_units: 8
    mlp:
      hidden_layers:
        - 20
        - 20
        - 20
      dense_initial: false
      activation:
        name: ReLU
    feat_expansion:
      name: deeponet.FourierFeatureExpansion
      origin: [ 0, 0 ]  # These depend on the dataset being used
      scale: [ 5, 5 ]
      mode: random
      features: 160
      learnable: true

  approximator_net:
    name: MLP
    d_in: *p
    d_out: *q
    hidden_layers: []
    activation:
      name: Identity
