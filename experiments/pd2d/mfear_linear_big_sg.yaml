model:
  name: MFEAR
  integrator:
    name: SplineGridIntegrator
    n: 2
    x_min: [0, 0]
    x_max: [5, 5]
    lazy: true

  encoder_net:
    name: mfear.CompactMLPBasis
    d_in: 2
    d_out: 2
    p: &p 256
    mlp:
      hidden_layers:
        - 320
        - 320
        - 320
      activation:
        name: GELU
    feat_expansion:
      name: deeponet.FourierFeatureExpansion
      origin: [ 0, 0 ]  # These depend on the dataset being used
      scale: [ 5, 5 ]
      mode: random
      features: 320
      learnable: true

  reconstructor_net:
    name: mfear.CompactMLPBasis
    d_in: 2
    d_out: 2
    p: &q 256
    mlp:
      hidden_layers:
        - 320
        - 320
        - 320
      activation:
        name: GELU
    feat_expansion:
      name: deeponet.FourierFeatureExpansion
      origin: [ 0, 0 ]  # These depend on the dataset being used
      scale: [ 5, 5 ]
      mode: random
      features: 320
      learnable: true

  approximator_net:
    name: MLP
    d_in: *p
    d_out: *q
    hidden_layers: []
    activation:
      name: Identity
