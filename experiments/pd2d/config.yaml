data:
  train:
    file_name: data/pd2d/train19_tg_50.ol.h5
    stream_uv: false
  test:
    file_name: data/pd2d/test19_tg_50.ol.h5
    stream_uv: false

optim:
  name: Adam
  lr: 0.0005

metrics:
  rel_l2:
    name: FunctionalL2Loss
    relative: true
    squared: false

training:
  normalize: false
  loss_fn:
    name: FunctionalL1Loss
    relative: false
  batch_size: 128
  epochs: 3000

