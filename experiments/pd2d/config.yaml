data:
  train:
    file_name: data/pd2d/train_tg3.ol.h5
    stream_uv: false
  test:
    file_name: data/pd2d/test_tg3.ol.h5
    stream_uv: false

optim:
  name: Adam
  lr: 0.0005

metrics:
  rel_l2:
    name: FunctionalL2Loss
    relative: true
    squared: false

training:
  loss_fn:
    name: SmoothedLoss
    base_loss:
      name: FunctionalL2Loss
      relative: true
      squared: false
    smoothing_operator:
      name: GaussianSmoothing2d
      kernel_sigma: 0.2
      x_min: [0.0, 0.0]
      x_max: [5.0, 5.0]
      n: [200, 200]
  batch_size: 16
  epochs: 200

