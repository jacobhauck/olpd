data:
  train:
    file_name: data/pd2d/train1.ol.h5
    stream_uv: true
  test:
    file_name: data/pd1d/test1.ol.h5
    stream_uv: true

optim:
  name: Adam
  lr: 0.003
  
lr_scheduler:
  name: ExponentialLR
  gamma: 0.99

metrics:
  rel_l2:
    name: FunctionalL2Loss
    relative: true
    squared: false

training:
  loss_fn:
    name: FunctionalL1Loss
    relative: false
  batch_size: 16
  epochs: 200

