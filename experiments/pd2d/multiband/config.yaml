data:
  train:
    file_name: data/pd2d/test_tg5.ol.h5
    stream_uv: false
  test:
    file_name: data/pd2d/test_tg5.ol.h5
    stream_uv: false

optim:
  name: Adam
  lr: 0.001

metrics:
  rel_l2:
    name: FunctionalL2Loss
    relative: true
    squared: false

training:
  loss_fn:
    name: multiband.MultiLoss
    base_loss:
      name: FunctionalL2Loss
      relative: true
      squared: false
    weights: [1.0, 1.0]
  batch_size: 1
  epochs: 200
  resolutions: [50, 100]
  bands: [0]
