data:
  train:
    file_name: data/pd2d/train_tg3.ol.h5
    stream_uv: false
  test:
    file_name: data/pd2d/test_tg3.ol.h5
    stream_uv: false

optim:
  name: Adam
  lr: 0.001

metrics:
  rel_l2:
    name: FunctionalL2Loss
    relative: true
    squared: false

training:
  loss_fn:
    name: FunctionalL1Loss
    relative: false
  batch_size: 16
  epochs: 200

multiband:
  decomposition:
    name: multiband.MultibandDecomposition2d
    low_freq_cutoff:
      name: smooth_error.GaussianSmoothing2d
      kernel_sigma: 0.2
      x_min: [ 0.0, 0.0 ]
      x_max: [ 5.0, 5.0 ]
      n: [ 200, 200 ]
    dilation: 1.5
    num_steps: 2