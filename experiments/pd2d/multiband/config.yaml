data:
  train:
    file_name: data/pd2d/train1.ol.h5
    stream_uv: true
  test:
    file_name: data/pd1d/test1.ol.h5
    stream_uv: true

optim:
  name: Adam
  lr: 0.001

training:
  loss_fn:
    name: RelativeL2Loss
  batch_size: 64
  epochs: 200

multiband:
  subsampling_interval: 0.3
  decomposition:
    name: multiband.MultibandDecomposition2d
    low_freq_cutoff:
      name: smooth_error.GaussianSmoothing2d
      kernel_sigma: 0.3
      x_min: [ 0.0, 0.0 ]
      x_max: [ 5.0, 5.0 ]
      n: [ 200, 200 ]
    dilation: 1.5
    num_steps: 4