data:
  train:
    file_name: data/pd2d/train_tg5.ol.h5
    stream_uv: false
  test:
    file_name: data/pd2d/test_tg5.ol.h5
    stream_uv: false

optim:
  name: Adam
  lr: 0.001

metrics:
  rel_l2:
    name: FunctionalL2Loss
    relative: true
    squared: false

training:
  normalize: true
  loss_fn:
    name: FunctionalL1Loss
    relative: false
  batch_size: 64
  epochs: 1500
  resolutions: [50, 50]
  bands: [0, 1]
  band_weights: [1.0, 1.0]
