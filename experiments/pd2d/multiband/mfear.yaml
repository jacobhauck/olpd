          normalized_shape: 128

  decomposition:
    name: multiband.MultibandDecomposition2d
    low_freq_cutoff:
      name: smooth_error.GaussianSmoothing2d
      kernel_sigma: 0.23
      x_min: [ 0.0, 0.0 ]
      x_max: [ 5.0, 5.0 ]
      n: [ 200, 200 ]
      adaptive: true
    dilation: 1.5
    num_steps: 4
