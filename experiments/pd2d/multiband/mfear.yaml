model:
  name: multiband.MultiModel
  models: 
    -
      name: MFEAR
      integrator:
        name: TrapezoidIntegrator

      encoder_net:
        name: mfear.CompactMLPBasis
        d_in: 2
        d_out: 2
        p: &p0 32
        mlp:
          hidden_layers:
            - 64
            - 64
            - 64
          activation:
            name: ReLU
        feat_expansion:
          name: deeponet.FourierFeatureExpansion
          origin: [ 0, 0 ]  # These depend on the dataset being used
          scale: [ 5, 5 ]
          mode: random
          features: 64
          learnable: true

      reconstructor_net:
        name: mfear.CompactMLPBasis
        d_in: 2
        d_out: 2
        p: &q0 64
        mlp:
          hidden_layers:
            - 64
            - 64
            - 64
          activation:
            name: ReLU
        feat_expansion:
          name: deeponet.FourierFeatureExpansion
          origin: [ 0, 0 ]  # These depend on the dataset being used
          scale: [ 5, 5 ]
          mode: random
          features: 64
          learnable: true

      approximator_net:
        name: MLP
        d_in: *p0
        d_out: *q0
        hidden_layers:
          - 96
          - 96
          - 96
          - 96
        activation:
          name: ReLU
        norm:
          name: LayerNorm
          normalized_shape: 96
    -
      name: MFEAR
      integrator:
        name: TrapezoidIntegrator

      encoder_net:
        name: mfear.CompactMLPBasis
        d_in: 2
        d_out: 2
