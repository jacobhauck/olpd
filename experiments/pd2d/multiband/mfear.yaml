          scale: [ 5, 5 ]
          mode: random
          features: 64
          learnable: true

      approximator_net:
        name: MLP
        d_in: *p1
        d_out: *q1
        hidden_layers:
          - 96
          - 96
          - 96
          - 96
        activation:
          name: ReLU
        norm:
          name: LayerNorm
          normalized_shape: 96
    -
      name: MFEAR
